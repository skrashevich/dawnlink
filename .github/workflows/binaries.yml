name: Binaries

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: binaries-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            format: tar
          - goos: linux
            goarch: arm64
            format: tar
          - goos: darwin
            goarch: amd64
            format: tar
          - goos: darwin
            goarch: arm64
            format: tar
          - goos: windows
            goarch: amd64
            format: zip
          - goos: windows
            goarch: arm64
            format: zip
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build and package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          name="dawnlink-${GOOS}-${GOARCH}"
          mkdir -p "dist/${name}"
          binary="dawnlink"
          if [ "$GOOS" = "windows" ]; then
            binary="dawnlink.exe"
          fi
          go build -trimpath -ldflags="-s -w" -o "dist/${name}/${binary}" ./cmd/dawnlink
          if [ "${{ matrix.format }}" = "zip" ]; then
            (cd dist && zip -9 -r "${name}.zip" "${name}")
            rm -rf "dist/${name}"
          else
            tar -C dist -czf "dist/${name}.tar.gz" "${name}"
            rm -rf "dist/${name}"
          fi

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: dawnlink-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error
          compression-level: 0

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --generate-notes
